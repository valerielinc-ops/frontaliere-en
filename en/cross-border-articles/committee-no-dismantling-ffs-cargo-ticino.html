<meta property="og:description" content="The No Ffs Cargo Disassembly Committee presents its proposals for Ticino.  The committee, which has been actively campaigning against the disassembly of Ffs Cargo in Ticino, has now presented its proposals for the region. The committee's main goal is to preserve the rail freight transport network in Ticino and maintain its economic importance.  Some of the key proposals include:  - Enhancing the efficiency of rail freight transport in Ticino - Increasing the use of environmentally friendly modes of transport - Developing new infrastructure to support rail freight transport  The committee believes that these proposals will help to preserve the rail freight transport network in Ticino and maintain its economic importance. The committee is calling on the authorities to take these proposals into consideration and work towards a solution that benefits the region.">
